<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IGPartners - Chọn Bệnh Viện</title>

  <!-- 폰트 불러오기 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap"
    rel="stylesheet">

  <!-- 메인 스타일시트 연동 -->
  <link rel="stylesheet" href="/css/style.css?v=2.0.7">
</head>

<body>
  <!-- 백그라운드 오로라 빛 장식 -->
  <div class="bg-decorations">
    <div class="aurora-1"></div>
    <div class="aurora-2"></div>
  </div>

  <div class="container">
    <!-- 상단 로그인/사용자 정보 영역 -->
    <div class="auth-bar">
      <div id="auth-user" class="auth-user" style="display: none;">
        <img id="user-photo" src="" alt="Profile" class="user-photo">
        <span id="user-name" class="user-name"></span>
        <button id="btn-logout" class="btn-auth logout">로그아웃 (Logout)</button>
      </div>
      <button id="btn-login" class="btn-auth login">로그인</button>
    </div>

    <!-- 언어선택 돌아가기 버튼 -->
    <a href="../index.html" class="back-to-lang">언어선택</a>

    <header class="header">
      <div id="brand-logo-container" data-text="IGPartners Medical Appointment"></div>
      <h1 class="title">Chọn Bệnh Viện</h1>
      <p class="subtitle">Vui lòng chọn bệnh viện mong muốn để tiến hành đặt lịch hẹn.</p>
    </header>
    <!-- 3열 반응형 병원 그리드 영역 (Firestore에서 동적 로드) -->
    <main class="clinic-grid" id="clinic-list-container">
    </main>
  </div>

  <script type="module" src="/js/clinic-loader.js?v=2.0.7"></script>
  <script type="module" src="/js/auth.js?v=2.0.7"></script>
  <script type="module" src="/js/logo.js?v=2.0.7"></script>
</body>

</html>
