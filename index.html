<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IGPartners - 글로벌 헬스케어 메디컬 파트너</title>

  <!-- Google 폰트 로드 (Outfit 및 Noto Sans KR) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap"
    rel="stylesheet">

  <!-- 통합 스타일시트 연동 -->
  <link rel="stylesheet" href="css/style.css?v=2.4.1">
</head>

<body class="home-page">
  <!-- 백그라운드 퍼짐 효과용 오로라 장식 요소 -->
  <div class="bg-decorations">
    <div class="aurora-1"></div>
    <div class="aurora-2"></div>
  </div>

  <!-- 공통 상단 네비게이션 바 컨테이너 (js/navigation.js를 통해 동적 주입) -->
  <header id="global-header"></header>

  <!-- 1. 히어로 섹션 (웅장한 웰컴 영역) -->
  <section class="hero-section">
    <div class="hero-glow"></div>
    <div class="hero-content">
      <!-- 한글 주석: 사용자의 긴급 예약 편의성을 극대화하기 위해 히어로 최상단에 세련된 글로우 예약 버튼 배치 (div 컨테이너를 추가하여 수직 개행 보장) -->
      <div class="hero-booking-btn-container">
        <a href="/booking-lang.html" class="hero-booking-btn">진료예약하기</a>
      </div>
      <span class="hero-tag">Global Medical Partner</span>
      <h1 class="hero-title">글로벌 메디컬 케어의 기준,<br>IGPartners가 함께합니다.</h1>
    </div>
  </section>

  <!-- 한글 주석: 홈 화면 레이아웃 간소화 요청에 따라 기존 #about 및 #services 섹션을 제거함. 상세 내용은 독립된 약속된 페이지(about.html, services.html)에서 제공함 -->

  <!-- 4. 협력 회사 섹션 (Partners Network) -> 프리미엄 광고 타일 그리드로 개편 -->
  <section id="partners" class="content-section">
    <div class="section-container">
      <div class="section-header">
        <span class="section-tag">Global Partners</span>
        <h2 class="section-title">제휴 협력 병원 및 추천 의료 솔루션</h2>
        <p class="section-desc">국내 거주 외국인 환자들에게 정밀 의료 서비스와 신뢰를 제공하는 실시간 파트너 네트워크입니다.</p>
      </div>

      <!-- 실시간 DB 연동을 위해 자바스크립트로 동적 로드되는 광고 그리드 -->
      <div class="ad-grid" id="ad-grid-container">
        <!-- [한글 주석] 데이터 로딩이 시작되기 전 노출되는 인디케이터 -->
        <div
          style="grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: #00f3ff; font-weight: 700; font-size: 1.1rem; letter-spacing: 0.05em;">
          🌐 실시간 파트너 솔루션을 불러오는 중입니다...
        </div>
      </div>
    </div>
  </section>

  <!-- [한글 주석: 유지보수 용이성을 위해 푸터 내용을 공통 JS(navigation.js)에서 동적 주입하도록 구조 개선] -->
  <footer id="global-footer" class="global-footer"></footer>

  <!-- Firebase 및 핵심 연동 모듈 로드 (순서 엄수) -->
  <script type="module" src="js/navigation.js?v=2.4.1"></script>
  <script type="module" src="/js/auth.js?v=2.4.1"></script>
  <!-- 신규 추가: 홈페이지용 광고 슬라이더 롤링 애니메이션 연동 -->
  <script type="module" src="/js/ad-slider.js?v=2.4.1"></script>

  <!-- 로그인 안내 모달 팝업 -->
  <div id="login-required-modal" class="modal-backdrop" style="display: none;">
    <div class="modal-content" style="max-width: 450px;">
      <div class="modal-header">
        <h2>🔒 로그인 필요 </h2>
        <button id="btn-close-login-modal-x" class="modal-close-x">&times;</button>
      </div>
      <div class="modal-body" style="padding: 2rem; text-align: center;">
        <p style="font-size: 1.05rem; color: #ffffff; font-weight: 700; margin-bottom: 0.8rem; line-height: 1.5;">
          <br>
          이 서비스는 구글 로그인이 필요합니다.
        </p>
        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6); line-height: 1.5; margin: 0;">
          예약 신청 및 내역 확인을 위해 구글 로그인을 진행해주세요.
        </p>
      </div>
      <div class="modal-footer" style="gap: 0.75rem; justify-content: center; padding: 1.2rem 2rem;">
        <button id="btn-close-login-modal" class="btn btn-secondary"
          style="font-size: 0.9rem; padding: 0.5rem 1.5rem; min-width: 90px;">닫기</button>
        <button id="btn-trigger-login" class="btn btn-primary"
          style="font-size: 0.9rem; padding: 0.5rem 1.5rem; min-width: 110px; background: linear-gradient(135deg, #4f8ff7 0%, #a5b4fc 100%);">Đăng
          로그인</button>
      </div>
    </div>
  </div>
</body>

</html>
