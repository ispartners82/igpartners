<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IGPartners - Select Language</title>

  <!-- 폰트 불러오기 (Outfit & Noto Sans KR) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap"
    rel="stylesheet">

  <!-- 외부 분리된 스타일시트 연동 -->
  <link rel="stylesheet" href="css/style.css?v=2.1.7">
</head>

<body>
  <!-- 백그라운드 오로라 빛 장식 -->
  <div class=" bg-decorations">
    <div class="aurora-1"></div>
    <div class="aurora-2"></div>
  </div>

  <div class="container">
    <!-- 상단 로그인/사용자 정보 영역 -->
    <div class="auth-bar">
      <div id="auth-user" class="auth-user" style="display: none;">
        <img id="user-photo" src="" alt="Profile" class="user-photo">
        <span id="user-name" class="user-name"></span>
        <a href="/my-reservations.html" id="btn-my-reservations" class="btn-auth-sub">📅 예약내역</a>
        <!-- 관리자 등급 전용 대시보드 바로가기 버튼 (통합형으로 중간에 배치) -->
        <a href="/admin.html" id="btn-admin-dashboard" class="btn-auth-sub" style="display: none;">⚙️ 관리자</a>
        <button id="btn-logout" class="btn-auth logout">로그아웃 (Logout)</button>
      </div>
      <button id="btn-login" class="btn-auth login">로그인</button>
    </div>
    <header class="header">
      <div id="brand-logo-container" data-text="IGPartners Medical Appointment"></div>
      <h1 class="title">Select Language</h1>
      <p class="subtitle">예약을 진행하기 위해 편리한 언어를 선택해 주세요.</p>
    </header>

    <!-- 4열 반응형 언어 그리드 영역 -->
    <main class="grid-container">

      <!-- 1. 베트남 -->
      <button class="lang-card" onclick="selectLanguage('vi')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/vn.png" alt="Vietnam Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">Tiếng Việt</span>
          <span class="lang-ko">베트남어</span>
        </div>
      </button>

      <!-- 2. 러시아 -->
      <button class="lang-card" onclick="selectLanguage('ru')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/ru.png" alt="Russia Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">Русский</span>
          <span class="lang-ko">러시아어</span>
        </div>
      </button>

      <!-- 3. 미얀마 -->
      <button class="lang-card" onclick="selectLanguage('my')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/mm.png" alt="Myanmar Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">မြန်မာစာ</span>
          <span class="lang-ko">미얀마어</span>
        </div>
      </button>

      <!-- 4. 캄보디아 -->
      <button class="lang-card" onclick="selectLanguage('km')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/kh.png" alt="Cambodia Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">ភាសាខ្មែរ</span>
          <span class="lang-ko">캄보디아어</span>
        </div>
      </button>

      <!-- 5. 몽골 -->
      <button class="lang-card" onclick="selectLanguage('mn')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/mn.png" alt="Mongolia Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">Монгол хэл</span>
          <span class="lang-ko">몽골어</span>
        </div>
      </button>

      <!-- 6. 태국 -->
      <button class="lang-card" onclick="selectLanguage('th')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/th.png" alt="Thailand Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">ภาษาไทย</span>
          <span class="lang-ko">태국어</span>
        </div>
      </button>

      <!-- 7. 라오스 -->
      <button class="lang-card" onclick="selectLanguage('lo')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/la.png" alt="Laos Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">ພາສາລາວ</span>
          <span class="lang-ko">라오스어</span>
        </div>
      </button>

      <!-- 8. 네팔 -->
      <button class="lang-card" onclick="selectLanguage('ne')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/np.png" alt="Nepal Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">नेपाली</span>
          <span class="lang-ko">네팔어</span>
        </div>
      </button>

      <!-- 9. 중국 -->
      <button class="lang-card" onclick="selectLanguage('zh')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/cn.png" alt="China Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">中文 (简体)</span>
          <span class="lang-ko">중국어</span>
        </div>
      </button>

      <!-- 10. 인도네시아 -->
      <button class="lang-card" onclick="selectLanguage('id')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/id.png" alt="Indonesia Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">Bahasa Indonesia</span>
          <span class="lang-ko">인도네시아어</span>
        </div>
      </button>

      <!-- 11. 스리랑카 -->
      <button class="lang-card" onclick="selectLanguage('si')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/lk.png" alt="Sri Lanka Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">සිංහල</span>
          <span class="lang-ko">스리랑카어</span>
        </div>
      </button>

      <!-- 12. 방글라데시 -->
      <button class="lang-card" onclick="selectLanguage('bn')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/bd.png" alt="Bangladesh Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">বাংলা</span>
          <span class="lang-ko">방글라데시어</span>
        </div>
      </button>

      <!-- 13. 영어 -->
      <button class="lang-card" onclick="selectLanguage('en')">
        <div class="flag-wrapper">
          <img class="flag" src="https://flagcdn.com/w80/gb.png" alt="English Flag">
        </div>
        <div class="lang-info">
          <span class="lang-native">English</span>
          <span class="lang-ko">영어</span>
        </div>
      </button>

    </main>
  </div>

  <!-- Firebase 및 메인 로직 로드 (ES Module) -->
  <script type="module" src="js/main.js?v=2.1.7"></script>
  <script type="module" src="/js/auth.js?v=2.1.7"></script>
  <script type="module" src="/js/logo.js?v=2.1.7"></script>

  <!-- 로그인 안내 모달 팝업 -->
  <div id="login-required-modal" class="modal-backdrop" style="display: none;">
    <div class="modal-content" style="max-width: 450px;">
      <div class="modal-header">
        <h2>🔒 Yêu cầu đăng nhập (로그인 필요)</h2>
        <button id="btn-close-login-modal-x" class="modal-close-x">&times;</button>
      </div>
      <div class="modal-body" style="padding: 2rem; text-align: center;">
        <p style="font-size: 1.05rem; color: #ffffff; font-weight: 700; margin-bottom: 0.8rem; line-height: 1.5;">
          Dịch vụ này yêu cầu đăng nhập bằng tài khoản Google.<br>
          (이 서비스는 구글 로그인이 필요합니다.)
        </p>
        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6); line-height: 1.5; margin: 0;">
          Vui lòng đăng nhập để tiếp tục đặt lịch hẹn và xem lịch sử đặt hẹn của bạn.<br>
          (예약 신청 및 내역 확인을 위해 구글 로그인을 진행해주세요.)
        </p>
      </div>
      <div class="modal-footer" style="gap: 0.75rem; justify-content: center; padding: 1.2rem 2rem;">
        <button id="btn-close-login-modal" class="btn btn-secondary" style="font-size: 0.9rem; padding: 0.5rem 1.5rem; min-width: 90px;">Đóng (닫기)</button>
        <button id="btn-trigger-login" class="btn btn-primary" style="font-size: 0.9rem; padding: 0.5rem 1.5rem; min-width: 110px; background: linear-gradient(135deg, #4f8ff7 0%, #a5b4fc 100%);">Đăng nhập (로그인)</button>
      </div>
    </div>
  </div>
</body>

</html>
